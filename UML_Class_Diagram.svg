<svg viewBox="0 0 780 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="780" height="580" fill="#f8fafd" rx="12"/>

  <!-- Title -->
  <text x="390" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a3c5e">UML Class Diagram — Student Course Management System</text>

  <!-- ─── PERSON CLASS ─── -->
  <!-- Shadow -->
  <rect x="243" y="98" width="294" height="130" rx="8" fill="#c0cfe0" opacity="0.4"/>
  <!-- Box -->
  <rect x="240" y="95" width="294" height="130" rx="8" fill="white" stroke="#1a3c5e" stroke-width="2"/>
  <!-- Header -->
  <rect x="240" y="95" width="294" height="38" rx="8" fill="#1a3c5e"/>
  <rect x="240" y="116" width="294" height="17" fill="#1a3c5e"/>
  <text x="387" y="119" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Person</text>

  <!-- Divider -->
  <line x1="240" y1="133" x2="534" y2="133" stroke="#c0cfe0" stroke-width="1.5"/>

  <!-- Attributes -->
  <text x="258" y="152" font-size="12" fill="#333">
    <tspan fill="#7c5ccc" font-style="italic"># </tspan>name : string
  </text>

  <!-- Divider -->
  <line x1="240" y1="166" x2="534" y2="166" stroke="#c0cfe0" stroke-width="1.5"/>

  <!-- Methods -->
  <text x="258" y="184" font-size="12" fill="#333">
    <tspan fill="#1a7a1a">+ </tspan>Person(name : string)
  </text>
  <text x="258" y="202" font-size="12" fill="#333">
    <tspan fill="#1a7a1a">+ </tspan>getName() : string
  </text>

  <!-- ─── INHERITANCE ARROW ─── -->
  <line x1="387" y1="225" x2="387" y2="290" stroke="#1a3c5e" stroke-width="2" stroke-dasharray="0"/>
  <!-- Hollow triangle arrowhead pointing up (inheritance) -->
  <polygon points="387,225 377,245 397,245" fill="white" stroke="#1a3c5e" stroke-width="2"/>

  <!-- Inheritance Label -->
  <text x="400" y="260" font-size="11" fill="#666" font-style="italic">inherits</text>

  <!-- ─── STUDENT CLASS ─── -->
  <!-- Shadow -->
  <rect x="183" y="298" width="408" height="200" rx="8" fill="#c0cfe0" opacity="0.4"/>
  <!-- Box -->
  <rect x="180" y="295" width="408" height="200" rx="8" fill="white" stroke="#2e6da4" stroke-width="2"/>
  <!-- Header -->
  <rect x="180" y="295" width="408" height="38" rx="8" fill="#2e6da4"/>
  <rect x="180" y="316" width="408" height="17" fill="#2e6da4"/>
  <text x="384" y="319" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Student</text>

  <!-- Divider -->
  <line x1="180" y1="333" x2="588" y2="333" stroke="#c0cfe0" stroke-width="1.5"/>

  <!-- Attributes -->
  <text x="198" y="352" font-size="12" fill="#333"><tspan fill="#c0392b">- </tspan>id : int</text>
  <text x="198" y="370" font-size="12" fill="#333"><tspan fill="#c0392b">- </tspan>gpa : double</text>
  <text x="198" y="388" font-size="12" fill="#333"><tspan fill="#c0392b">- </tspan>courses : set&lt;string&gt;</text>

  <!-- Divider -->
  <line x1="180" y1="400" x2="588" y2="400" stroke="#c0cfe0" stroke-width="1.5"/>

  <!-- Methods -->
  <text x="198" y="418" font-size="12" fill="#333"><tspan fill="#1a7a1a">+ </tspan>Student(id : int, name : string, gpa : double)</text>
  <text x="198" y="436" font-size="12" fill="#333"><tspan fill="#1a7a1a">+ </tspan>getId() : int</text>
  <text x="198" y="454" font-size="12" fill="#333"><tspan fill="#1a7a1a">+ </tspan>getGpa() : double</text>
  <text x="198" y="472" font-size="12" fill="#333"><tspan fill="#1a7a1a">+ </tspan>addCourse(course : string) : void</text>
  <text x="198" y="490" font-size="12" fill="#333"><tspan fill="#1a7a1a">+ </tspan>showCourses() : void</text>

  <!-- ─── MAIN (Controller) box ─── -->
  <rect x="58" y="295" width="98" height="80" rx="6" fill="white" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="107" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">main()</text>
  <text x="107" y="348" text-anchor="middle" font-size="9.5" fill="#777">vector&lt;Student&gt;</text>
  <text x="107" y="362" text-anchor="middle" font-size="9" fill="#aaa">«controller»</text>

  <!-- Association arrow: main → Student -->
  <line x1="156" y1="335" x2="180" y2="335" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="180,335 170,330 170,340" fill="#888"/>
  <text x="115" y="390" text-anchor="middle" font-size="9" fill="#888">uses</text>

  <!-- ─── LEGEND ─── -->
  <rect x="580" y="295" width="172" height="170" rx="7" fill="white" stroke="#cccccc" stroke-width="1.2"/>
  <text x="666" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3c5e">Legend</text>
  <line x1="590" y1="320" x2="744" y2="320" stroke="#cccccc" stroke-width="1"/>

  <!-- Legend items -->
  <rect x="595" y="330" width="14" height="14" fill="#1a3c5e" rx="2"/>
  <text x="616" y="342" font-size="11" fill="#333">Class Header</text>

  <text x="595" y="368" font-size="13" fill="#7c5ccc">#</text>
  <text x="616" y="368" font-size="11" fill="#333">Protected</text>

  <text x="595" y="390" font-size="13" fill="#c0392b">-</text>
  <text x="616" y="390" font-size="11" fill="#333">Private</text>

  <text x="595" y="412" font-size="13" fill="#1a7a1a">+</text>
  <text x="616" y="412" font-size="11" fill="#333">Public</text>

  <!-- Inheritance symbol in legend -->
  <line x1="600" y1="444" x2="600" y2="455" stroke="#1a3c5e" stroke-width="1.8"/>
  <polygon points="600,433 594,447 606,447" fill="white" stroke="#1a3c5e" stroke-width="1.8"/>
  <text x="616" y="445" font-size="11" fill="#333">Inheritance</text>

  <!-- ─── Footer ─── -->
  <text x="390" y="555" text-anchor="middle" font-size="10" fill="#aaa">Student Course Management System · C++ OOP Project</text>

</svg>
